<!DOCTYPE html>
<html>
<head>
    <title>CURSONET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'inicio' %}">CURSONET</a>
        <div class="d-flex gap-2 align-items-center">
            <a class="btn btn-outline-light btn-sm" href="{% url 'lista_productos' %}">Cursos</a>
            <a class="btn btn-outline-light btn-sm" href="{% url 'reporte_matriculas' %}">Reporte matrículas</a>
            <a class="btn btn-outline-light btn-sm" href="{% url 'mis_pedidos' %}">Mis matriculas (
                {% if request.user.is_authenticated %}
                    {{ request.user.pedido_set.count }}
                {% else %}
                    {% if request.session.cart %}
                        {{ request.session.cart|length }}
                    {% else %}
                        0
                    {% endif %}
                {% endif %}
            )</a>
            <a class="btn btn-outline-light btn-sm" href="{% url 'logout' %}">Cerrar sesión</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>
</body>
</html>
